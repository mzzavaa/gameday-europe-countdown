name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out this config repo
      - name: Checkout event config
        uses: actions/checkout@v4
        with:
          path: countdown

      # 2. Enable GitHub Pages with GitHub Actions as the deployment source.
      #    POST creates it if it doesn't exist; PUT switches source if it does.
      #    Both commands use `|| true` so they never fail the build.
      - name: Enable GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pages \
            --method POST -f build_type=workflow 2>/dev/null || \
          gh api repos/${{ github.repository }}/pages \
            --method PUT  -f build_type=workflow 2>/dev/null || true

      # 3. Check out the stream template repo (all web-player and composition code)
      #    By default uses the upstream template. To use your own fork:
      #    → Settings → Variables → New variable
      #    → Name: TEMPLATE_REPO  Value: your-org/your-template-repo-name
      - name: Checkout stream template
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.TEMPLATE_REPO || 'mzzavaa/community-gameday-europe-stream-templates' }}
          path: stream

      # 4. Inject event config into the template
      #    schedule.ts     → web-player (drives segment switching and countdown)
      #    participants.ts → stream config (organizers, UG data, logos — single source of truth)
      - name: Apply event config
        run: |
          cp countdown/config/schedule.ts    stream/web-player/src/schedule.ts
          cp countdown/config/participants.ts stream/config/participants.ts

      # 5. Merge event-specific face photos (if present in this repo)
      #    Add organizer face photos to public/faces/ in this repo.
      #    They will overwrite or supplement the template's default assets.
      - name: Merge face photos
        run: |
          if [ -d countdown/public/faces ]; then
            cp -r countdown/public/faces/. stream/public/assets/faces/
            echo "Merged face photos from countdown/public/faces/"
          else
            echo "No face photos in countdown/public/faces/ — using template defaults"
          fi

      # 6. Install and build the web player.
      #    Base path is derived from the repository name so forks work automatically.
      #    GitHub Pages serves from: https://<owner>.github.io/<repo-name>/
      - name: Install stream root dependencies
        working-directory: stream
        run: npm install

      - name: Install web-player dependencies
        working-directory: stream/web-player
        run: npm install

      - name: Build
        working-directory: stream/web-player
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          echo "Building with base path: /${REPO_NAME}/"
          npm run build -- --base=/${REPO_NAME}/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: stream/web-player/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
