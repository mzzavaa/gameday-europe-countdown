name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Minimal permissions at workflow level — deploy job gets its own elevated scope
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages-ready: ${{ steps.check-pages.outputs.ready }}
    steps:
      # 1. Check out this config repo
      - name: Checkout event config
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: countdown
          persist-credentials: false

      # 2. Check out the stream template repo (all web-player and composition code)
      #    By default uses the upstream template. To use your own fork:
      #    → Settings → Secrets and variables → Actions → Variables tab
      #    → Name: TEMPLATE_REPO  Value: your-org/your-template-repo-name
      - name: Checkout stream template
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ vars.TEMPLATE_REPO || 'linda-mhmd/community-gameday-europe-stream-templates' }}
          path: stream
          persist-credentials: false

      # 3. Inject event config into the template
      #    schedule.ts     → web-player (drives segment switching and countdown)
      #    participants.ts → stream config (organizers, UG data, logos — single source of truth)
      - name: Apply event config
        run: |
          cp countdown/config/schedule.ts    stream/web-player/src/schedule.ts
          cp countdown/config/participants.ts stream/config/participants.ts
          if [ -f countdown/config/event.ts ]; then
            cp countdown/config/event.ts stream/config/event.ts
            echo "Applied event.ts from event repo"
          fi

      # 4. Merge event-specific assets (if present in this repo)
      #    Add organizer face photos to public/faces/ in this repo.
      #    Add support-process-h264.mp4 to public/assets/ to enable the support video.
      #    These files overwrite or supplement the template's default assets.
      - name: Merge assets
        run: |
          if [ -d countdown/public/faces ]; then
            cp -r countdown/public/faces/. stream/public/assets/faces/
            echo "Merged face photos from countdown/public/faces/"
          fi
          if [ -f countdown/public/support-process-h264.mp4 ]; then
            cp countdown/public/support-process-h264.mp4 stream/public/assets/support-process-h264.mp4
            echo "Merged support video from countdown/public/"
          fi

      # 5. Install and build the web player.
      #    Base path is derived from the repository name so forks work automatically.
      #    GitHub Pages serves from: https://<owner>.github.io/<repo-name>/
      - name: Install stream root dependencies
        working-directory: stream
        run: npm install

      - name: Install web-player dependencies
        working-directory: stream/web-player
        run: npm install

      - name: Build
        working-directory: stream/web-player
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          echo "Building with base path: /${REPO_NAME}/"
          npm run build -- --base=/${REPO_NAME}/

      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: stream/web-player/dist

      # 6. Check whether GitHub Pages is configured for GitHub Actions deployments.
      #    GitHub does not allow the GITHUB_TOKEN to enable Pages on forked repos in orgs.
      #    If Pages is not yet set up, this step prints setup instructions and skips deploy.
      #    Fix: Settings → Pages → Source → GitHub Actions, then push again.
      - name: Check GitHub Pages configuration
        id: check-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_TYPE=$(gh api repos/${{ github.repository }}/pages --jq '.build_type' 2>/dev/null || echo "none")
          if [ "$BUILD_TYPE" = "workflow" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
            echo "✅ GitHub Pages is configured for GitHub Actions — deploying."
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo ""
            echo "⚠️  GitHub Pages is not configured yet."
            echo "    1. Go to: https://github.com/${{ github.repository }}/settings/pages"
            echo "    2. Under Source, select: GitHub Actions"
            echo "    3. Push any change to main to deploy."
            echo ""
            echo "    The build artifact has been uploaded. Only the deploy step is skipped."
          fi

  deploy:
    needs: build
    if: needs.build.outputs.pages-ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
